spring:
  application:
    name: spring-ai-agent-demo

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    # 仅占位；真实多模型在 agent.models 下管理
    openai:
      api-key: ${DEEPSEEK_API_KEY:dummy-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash

server:
  port: 8080

logging:
  level:
    com.demo.agent: INFO
    org.springframework.ai: INFO

agent:
  # 没有 API Key 时启用 mock 兜底
  mock-when-no-api-key: true

  models:
    # === DeepSeek ===
    # 注意：deepseek-chat / deepseek-reasoner 已宣布于 2026/07/24 下线，
    # 这里直接用新模型名。如果你的账号尚未开通，可临时换回 deepseek-chat。
    deepseek-pro:
      provider: deepseek
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-v4-pro
      input-price: 0.435
      output-price: 0.870
      context-window: 1000000
    deepseek-flash:
      provider: deepseek
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-v4-flash
      input-price: 0.140
      output-price: 0.280
      context-window: 1000000
    # === 通义千问 (DashScope OpenAI 兼容入口) ===
    qwen-max:
      provider: dashscope
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen3.7-max
      input-price: 2.40
      output-price: 9.60
      context-window: 1000000
    qwen-plus:
      provider: dashscope
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen3.7-plus
      input-price: 0.80
      output-price: 2.00
      context-window: 1000000
    qwen-flash:
      provider: dashscope
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen3.6-flash
      input-price: 0.30
      output-price: 0.60
      context-window: 1000000
    # === 智谱 GLM ===
    glm-5:
      provider: zhipu
      api-key: ${ZHIPU_API_KEY:}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-5
      input-price: 5.00
      output-price: 5.00
      context-window: 200000
    glm-flash:
      provider: zhipu
      api-key: ${ZHIPU_API_KEY:}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-4.7-flash
      input-price: 0.10
      output-price: 0.10
      context-window: 200000

  routing:
    default: deepseek-flash
    rules:
      - when: complexity == SIMPLE
        model: glm-flash
      - when: intent == SUMMARIZE
        model: qwen-flash
      - when: complexity == COMPLEX
        model: deepseek-pro
      - when: tokenEstimate > 200000
        model: qwen-plus

  memory:
    l1-max-messages: 20
    compress-batch-size: 10

  a2a:
    enabled: true
    self-port: 8080
    peers: []     # 例如 ["http://localhost:9101"]
